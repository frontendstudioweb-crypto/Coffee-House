<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Aura Café | Login & Register</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Plus+Jakarta+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="style1.css">
</head>

<body>

    <!-- Background Overlay -->
    <div class="bg-overlay"></div>

    <!-- Authentication Section -->
    <section class="auth-section">

        <div class="container">

            <!-- Logo -->
            <div class="text-center mb-5">

                <h1 class="logo">AURA CAFÉ</h1>

                <p class="logo-text">
                    Premium Coffee Experience
                </p>

            </div>

            <div class="row justify-content-center">

                <div class="col-lg-5 col-md-8">

                    <div class="auth-card">

                        <!-- Image -->
                        <div class="card-image">

                            <img
                                id="cardImage"
                                src="https://images.unsplash.com/photo-1514432324607-a09d9b4aefdd?auto=format&fit=crop&w=900&q=80"
                                class="img-fluid"
                                alt="Coffee Image">

                            <div class="image-overlay">

                                <h2 id="cardTitle">
                                    Create Account
                                </h2>

                            </div>

                        </div>

                        <!-- Card Body -->
                        <div class="card-body p-4">

                            <!-- ========================= -->
                            <!-- REGISTER FORM -->
                            <!-- ========================= -->

                            <form id="registerForm">

                                <!-- Username -->
                                <div class="mb-3">

                                    <label for="username" class="form-label">
                                        Username
                                    </label>

                                    <div class="input-group">

                                        <span class="input-group-text">
                                            <i class="bi bi-person"></i>
                                        </span>

                                        <input
                                            type="text"
                                            id="username"
                                            class="form-control"
                                            placeholder="Enter Username"
                                            required>

                                    </div>

                                </div>

                                <!-- Email -->
                                <div class="mb-3">

                                    <label for="regEmail" class="form-label">
                                        Email
                                    </label>

                                    <div class="input-group">

                                        <span class="input-group-text">
                                            <i class="bi bi-envelope"></i>
                                        </span>

                                        <input
                                            type="email"
                                            id="regEmail"
                                            class="form-control"
                                            placeholder="Enter Email"
                                            required>

                                    </div>

                                </div>

                                <!-- Password -->
                                <div class="mb-3">

                                    <label for="regPassword" class="form-label">
                                        Password
                                    </label>

                                    <div class="input-group">

                                        <span class="input-group-text">
                                            <i class="bi bi-lock"></i>
                                        </span>

                                        <input
                                            type="password"
                                            id="regPassword"
                                            class="form-control password"
                                            placeholder="Password"
                                            required>

                                        <button
                                            type="button"
                                            class="btn btn-outline-secondary toggle-password">

                                            <i class="bi bi-eye"></i>

                                        </button>

                                    </div>

                                </div>

                                <!-- Confirm Password -->
                                <div class="mb-4">

                                    <label for="confirmPassword" class="form-label">
                                        Confirm Password
                                    </label>

                                    <div class="input-group">

                                        <span class="input-group-text">
                                            <i class="bi bi-lock-fill"></i>
                                        </span>

                                        <input
                                            type="password"
                                            id="confirmPassword"
                                            class="form-control password"
                                            placeholder="Confirm Password"
                                            required>

                                        <button
                                            type="button"
                                            class="btn btn-outline-secondary toggle-password">

                                            <i class="bi bi-eye"></i>

                                        </button>

                                    </div>

                                </div>

                                <!-- Register Button -->
                                <button
                                    type="submit"
                                    class="btn btn-premium w-100">

                                    Create Account

                                </button>

                                <div class="text-center mt-4">

                                    Already have an account?

                                    <a href="#" id="showLogin" class="auth-link">

                                        Login

                                    </a>

                                </div>

                            </form>

                            <!-- ========================= -->
                            <!-- LOGIN FORM -->
                            <!-- ========================= -->

                            <form id="loginForm" style="display:none;">

                                <!-- Email -->
                                <div class="mb-3">

                                    <label for="loginEmail" class="form-label">
                                        Email
                                    </label>

                                    <div class="input-group">

                                        <span class="input-group-text">
                                            <i class="bi bi-envelope"></i>
                                        </span>

                                        <input
                                            type="email"
                                            id="loginEmail"
                                            class="form-control"
                                            placeholder="Enter Email"
                                            required>

                                    </div>

                                </div>

                                <!-- Password -->
                                <div class="mb-4">

                                    <label for="loginPassword" class="form-label">
                                        Password
                                    </label>

                                    <div class="input-group">

                                        <span class="input-group-text">
                                            <i class="bi bi-lock"></i>
                                        </span>

                                        <input
                                            type="password"
                                            id="loginPassword"
                                            class="form-control password"
                                            placeholder="Password"
                                            required>

                                        <button
                                            type="button"
                                            class="btn btn-outline-secondary toggle-password">

                                            <i class="bi bi-eye"></i>

                                        </button>

                                    </div>

                                </div>

                                <!-- Remember -->
                                <div class="d-flex justify-content-between align-items-center mb-4">

                                    <div class="form-check">

                                        <input
                                            type="checkbox"
                                            class="form-check-input"
                                            id="remember">

                                        <label
                                            class="form-check-label"
                                            for="remember">

                                            Remember Me

                                        </label>

                                    </div>

                                    <a href="#" class="auth-link">

                                        Forgot Password?

                                    </a>

                                </div>

                                <!-- Login Button -->
                                <button
                                    type="submit"
                                    class="btn btn-premium w-100">

                                    Login

                                </button>

                                <div class="text-center mt-4">

                                    Don't have an account?

                                    <a href="#" id="showRegister" class="auth-link">

                                        Register

                                    </a>

                                </div>

                            </form>

                        </div>

                    </div>

                </div>

            </div>

        </div>

    </section>

    <!-- Bootstrap -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Custom JS -->
    <script src="script1.js"></script>

</body>

</html>
